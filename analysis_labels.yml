# ESPI analysis label and contrast declaration for tripwire checks.
# These labels mark the scientific boundary between blind preprocessing and interpretation.
metadata:
  required_columns:
    - Mouse
    - Condition
  derived_columns:
    sample_id:
      from:
        - Mouse
        - Condition
      formula: "paste0('M', Mouse, '_', gsub('[^A-Za-z0-9]', '', Condition))"
labels:
  treatment: Condition
  replicate_block: Mouse
blind_stage_policy:
  label_column: Condition
  allowed_early_uses:
    - metadata validation
    - metadata reporting
    - sample_id construction
contrast_direction:
  slug: p27cko-estim-vs-p27cko
  target: "p27CKO +EStim"
  reference: "p27CKO"
  sign_convention: "positive log fold-change means higher in p27CKO +EStim than p27CKO"
  statistical_unit: "Mouse x Condition pseudobulk sample"
