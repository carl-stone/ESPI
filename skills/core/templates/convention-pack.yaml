# Convention Pack Template
# Copy this file to network/conventions/[pack-name]/CONVENTION_PACK.yaml
# Fill in all fields. Delete comments before submitting to the network.

---
name: [pack-name]                          # Lowercase with hyphens. Must match the directory name.
version: 0.1.0                             # Start at 0.1.0. Increment on breaking changes.
# core: true                              # Only for mycelium-maintained packs. Omit this field for contributed packs (defaults to false).
description: >
  [2-4 sentences describing what practices this pack encodes. Be concrete: name the
  specific problem it solves and the domain(s) it applies to. Avoid vague language
  like "best practices" — say what the practices are.]
author: [your-project-name or "anonymous"] # Identifies the contributing project. Can be anonymized.
dependencies:
  - [pack-name]                            # Other packs that must be installed first. Empty list if none.
tags:
  - [tag1]                                 # Use lowercase. Include the domain, technique, and key concepts.
  - [tag2]
  - [tag3]
---
