description: >
  Routes analysis workflows to external skill repositories (bioSkills,
  scientific-agent-skills) and researcher personas (Autonomous-Science)
  without installing them as agent skill packs. Skills live as inert git
  clones on disk; conventions read specific SKILL.md files on demand,
  wrapping each invocation with defensive methodology and optional
  persona-guided review. Achieves ~125x context reduction vs. naive
  skill pack installation.
